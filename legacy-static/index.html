<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erkhet Solar Tours LLC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="home">
  <header id="site-header"></header>
  <main>
    <section class="hero">
      <div class="container hero-inner">
        <p class="eyebrow" data-i18n="home.heroEyebrow"></p>
        <h1 data-i18n="home.heroTitle"></h1>
        <p class="sub" data-i18n="home.heroSubtitle"></p>
        <div class="cta-row">
          <a class="btn btn-primary" href="tours.html" data-i18n="home.ctaTours"></a>
          <a class="btn btn-outline" href="contact.html" data-i18n="home.ctaPlan"></a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-head"><h2 data-i18n="home.aboutTitle"></h2></div>
        <div class="about-snippet card">
          <p data-i18n="home.aboutSnippet"></p>
          <a class="text-link" href="about.html" data-i18n="common.more"></a>
        </div>
      </div>
    </section>

    <section class="section alt">
      <div class="container">
        <div class="section-head"><h2 data-i18n="home.servicesTitle"></h2></div>
        <div id="home-services" class="grid cards-4"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-head split">
          <h2 data-i18n="home.featuredToursTitle"></h2>
          <a class="text-link" href="tours.html" data-i18n="common.viewAll"></a>
        </div>
        <div id="home-featured-tours" class="grid cards-3"></div>
      </div>
    </section>

    <section class="section alt">
      <div class="container">
        <div class="section-head split">
          <h2 data-i18n="home.regionsTitle"></h2>
          <a class="text-link" href="destinations.html" data-i18n="common.viewAll"></a>
        </div>
        <div id="home-regions" class="grid cards-3"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-head"><h2 data-i18n="home.valuesTitle"></h2></div>
        <div id="home-values" class="grid cards-5"></div>
      </div>
    </section>

    <section class="section cta-strip">
      <div class="container cta-box">
        <div>
          <h3 data-i18n="home.contactCtaTitle"></h3>
          <p data-i18n="home.contactCtaText"></p>
        </div>
        <a class="btn btn-primary" href="contact.html" data-i18n="common.sendInquiry"></a>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script src="js/site-data.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
