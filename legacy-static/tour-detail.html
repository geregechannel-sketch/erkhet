<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Detail | Erkhet Solar Tours LLC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="tours">
<header id="site-header"></header>
<main>
  <section class="page-hero"><div class="container"><h1 id="detail-title"></h1></div></section>
  <section class="section"><div class="container detail-hero">
    <article class="card"><img id="detail-image" class="cover" alt="tour"><div class="content"><p id="detail-overview"></p><h3>Itinerary</h3><div id="detail-itinerary"></div></div></article>
    <article class="card"><div class="content">
      <p><strong data-i18n="common.duration"></strong>: <span id="detail-duration"></span></p>
      <p><strong data-i18n="common.price"></strong>: <span id="detail-price"></span></p>
      <p><strong data-i18n="common.route"></strong>: <span id="detail-route"></span></p>
      <h4 data-i18n="detail.included"></h4>
      <ul class="feature-list"><li>Guide service</li><li>Transport within itinerary</li><li>Basic support coordination</li></ul>
      <h4 data-i18n="detail.notIncluded"></h4>
      <ul class="feature-list"><li>Personal expenses</li><li>Optional activities</li></ul>
      <a class="btn btn-primary" href="contact.html" data-i18n="detail.inquiry"></a>
    </div></article>
  </div></section>
</main>
<footer id="site-footer"></footer>
<script src="js/site-data.js"></script><script src="js/site.js"></script>
</body>
</html>
