<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Erkhet Solar Tours LLC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="contact">
<header id="site-header"></header>
<main>
  <section class="page-hero"><div class="container"><h1 data-i18n="contact.title"></h1><p data-i18n="contact.subtitle"></p></div></section>
  <section class="section"><div class="container contact-layout">
    <article class="card"><div class="content">
      <h3 data-i18n="contact.formTitle"></h3>
      <form id="enquiry-form" class="form-grid">
        <input class="input" name="name" required data-i18n-placeholder="contact.name">
        <input class="input" name="phone" required data-i18n-placeholder="contact.phone">
        <input class="input" name="email" type="email" data-i18n-placeholder="contact.email">
        <input class="input" name="tour" data-i18n-placeholder="contact.tour">
        <input class="input" name="people" type="number" min="1" data-i18n-placeholder="contact.people">
        <input class="input" name="days" type="number" min="1" data-i18n-placeholder="contact.days">
        <textarea class="input full" name="note" data-i18n-placeholder="contact.note"></textarea>
        <button class="btn btn-primary full" type="submit" data-i18n="contact.submit"></button>
      </form>
    </div></article>
    <div class="grid">
      <article class="card"><div class="content"><h3 data-i18n="contact.official"></h3><div id="official-contact"></div></div></article>
      <article class="card"><div class="content"><h3 data-i18n="contact.payment"></h3><div id="payment-info"></div></div></article>
      <article class="card"><div class="content"><h3 data-i18n="contact.qr"></h3><div id="qr-info" class="qr-wrap"></div></div></article>
    </div>
  </div></section>
</main>
<footer id="site-footer"></footer>
<script src="js/site-data.js"></script><script src="js/site.js"></script>
</body>
</html>
