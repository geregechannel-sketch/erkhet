version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: erkhet
      POSTGRES_USER: erkhet
      POSTGRES_PASSWORD: erkhet
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: postgres://erkhet:erkhet@db:5432/erkhet?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
