services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: erkhet
      POSTGRES_USER: erkhet
      POSTGRES_PASSWORD: erkhet
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erkhet -d erkhet"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgres://erkhet:erkhet@db:5432/erkhet?sslmode=disable
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      DEMO_USERS_ENABLED: ${DEMO_USERS_ENABLED:-true}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
